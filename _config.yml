# silasdray.com — site config
# Locked by 2026-05-08 site-strategy roundtable; see _docs/design-system.md
# and the dystopian-series session note for full rationale.

title: Silas Dray
description: >
  Ninety-Four is a serialized novel by Silas Dray. Audio first.
  Weekly chapters.
url: https://silasdray.com
baseurl: ""

# Pen-name discipline: only the pen name appears on the site.
author:
  name: Silas Dray
  url: https://silasdray.com

# SendFox subscribe form action — wired up 2026-05-10 (issue #13).
# List: "Silas Dray - Ninety-Four" (id 641890)
# Form: "Silas Dray - Website Signup" (id 278991), redirects to /thanks/
# Sender domain (silasdray.com) DKIM/SPF authenticated via Route 53.
sendfox_form_url: "https://sendfox.com/form/mp2kzd/36gxq2"

# GA4 — provisioned 2026-05-11 (issue #18).
# Property 537059721 "Silas Dray" under EPM Labs (accounts/322646987).
# Web data stream 14858542683.
google_analytics: "G-PH1LJ5KB44"

# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# jekyll-seo-tag config
twitter:
  card: summary
logo: # intentionally absent — no author photo, no logo (per pen-name discipline)

# jekyll-sitemap excludes pages with `sitemap: false` in front matter
# /thanks/ has both `noindex: true` AND `sitemap: false` to avoid GSC inconsistency

# Don't ship build artifacts or dev files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - .gitignore
  - _docs
  - node_modules

defaults:
  - scope:
      path: ""
    values:
      layout: default

# Custom 404 page is served from /404.html by GitHub Pages automatically
# when the file exists at that path
